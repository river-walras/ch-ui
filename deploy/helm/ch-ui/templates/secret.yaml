{{- if not .Values.existingSecret }}
{{- $name := include "ch-ui.fullname" . -}}
{{- $key := .Values.existingSecretKey -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "ch-ui.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.appSecretKey }}
  {{ $key }}: {{ .Values.appSecretKey | b64enc | quote }}
  {{- else if and $existing (hasKey $existing.data $key) }}
  # Reuse the value generated on a previous install so it stays stable across
  # upgrades (rotating it would make stored encrypted credentials undecryptable).
  {{ $key }}: {{ index $existing.data $key | quote }}
  {{- else }}
  {{ $key }}: {{ randAlphaNum 48 | b64enc | quote }}
  {{- end }}
{{- end }}
